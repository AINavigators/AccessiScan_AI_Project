[pytest]

# --- 1. TEST DISCOVERY ---
# PURPOSE: Defines the primary location of automated test suites.
testpaths = accessiscan_backend/tests

# --- 2. ASYNCIO CONFIGURATION ---
# PURPOSE: Enforces strict asyncio validation and establishes a
# session-scoped event loop for consistent asynchronous testing.
asyncio_mode = strict
asyncio_default_fixture_loop_scope = session

# --- 3. DIRECTORY EXCLUSIONS ---
# PURPOSE: Prevents pytest from recursively scanning virtual
# environments, generated artifacts, and model directories.
norecursedirs =
    venv
    .git
    data
    accessiscan_engine

# --- 4. TEST LOGGING ---
# PURPOSE: Enables real-time logging output during test execution
# to assist with debugging and traceability.
log_cli = true
log_cli_level = INFO
